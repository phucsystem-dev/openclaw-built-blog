name: Daily Gold Price Collection

on:
  schedule:
    # Run daily at 7:00 AM Melbourne time (21:00 UTC for AEST, 20:00 UTC for AEDT)
    # Using 20:00 UTC to cover both AEST and AEDT (7 AM Melbourne = 20:00 UTC in winter, 21:00 UTC in summer)
    - cron: '0 20 * * *'
  workflow_dispatch:  # Allow manual triggering

# Add write permissions for the workflow
permissions:
  contents: write

jobs:
  collect-gold-prices:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pytz
    
    - name: Create data directory
      run: mkdir -p data
    
    - name: Fetch and save gold prices
      run: |
        python scripts/fetch_gold_prices.py
      env:
        # Add your API keys here when ready:
        # VNAPPMOB_API_KEY: ${{ secrets.VNAPPMOB_API_KEY }}
        # METALPRICEAPI_KEY: ${{ secrets.METALPRICEAPI_KEY }}
    
    - name: Update dashboard with historical data
      run: |
        python scripts/update_dashboard.py
    
    - name: Check for changes
      id: git-check
      run: |
        git status --porcelain
        if [ -n "$(git status --porcelain)" ]; then
          echo "changes=true" >> $GITHUB_OUTPUT
        else
          echo "changes=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Commit and push changes
      if: steps.git-check.outputs.changes == 'true'
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/ js/gold-data.js
        git commit -m "📊 Daily gold price update - $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
        git push
    
    - name: Create workflow summary
      if: always()
      run: |
        echo "## Daily Gold Price Collection" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Run Time:** $(date)" >> $GITHUB_STEP_SUMMARY
        echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Count data files
        if [ -d "data" ]; then
          DATA_FILES=$(find data -name "gold-prices-*.md" | wc -l)
          echo "**Total Data Files:** $DATA_FILES" >> $GITHUB_STEP_SUMMARY
          
          # List recent files
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Recent Data Files:**" >> $GITHUB_STEP_SUMMARY
          find data -name "gold-prices-*.md" -exec basename {} \; | sort -r | head -5 | while read file; do
            echo "- $file" >> $GITHUB_STEP_SUMMARY
          done
        else
          echo "**Data directory not found**" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Next Run:** Scheduled for 7:00 AM Melbourne time tomorrow" >> $GITHUB_STEP_SUMMARY